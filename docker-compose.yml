services:
  db:
    image: postgres:latest
    container_name: base_app_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - base_app_db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: base_app_api
    depends_on:
      - db
    env_file:
      - .env
    environment:

      DATABASE_URL: postgresql://postgres.lhonmosdqenfsgymrubi:alex-gregz15@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
      PORT: 8000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"

    volumes:
      - base_app_db_data:/data

volumes:
  base_app_db_data: