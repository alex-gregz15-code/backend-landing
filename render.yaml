services:
  - type: web
    name: base-app-api
    runtime: rust
    buildCommand: cargo build --release --bin base_app
    startCommand: /app/target/release/base_app
    envVars:
      - key: DATABASE_URL
        scope: run
        sync: false
      - key: FRONTEND_URL
        scope: run
        sync: false
      - key: PORT
        value: "8000"
      - key: SQLX_OFFLINE
        value: "true"
    healthCheckPath: /api/hello
